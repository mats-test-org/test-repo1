name: Octopus Review
on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '.github/workflows/octopus.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: octopusreview/action@113a224ea0677cc707ef9e036fa4fdfe8c56c6fd
